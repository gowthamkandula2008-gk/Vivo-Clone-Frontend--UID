<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>vivo Product</title>

  <link
    rel="stylesheet"
    href="css/style.css"
  >

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

  <!-- NAVBAR -->

  <nav>

    <a href="index.html" class="nav-logo">
      vi<span>v</span>o
    </a>

    <ul class="nav-links">

      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#products">Phones</a></li>
      <li><a href="index.html#footer">Support</a></li>

    </ul>

  </nav>

  <!-- PRODUCT PAGE -->

  <section class="product-page">

    <!-- LEFT SIDE -->

    <div class="product-left">

      <div class="product-image-box">

        <img
          id="productImage"
          class="product-page-image"
          alt="vivo Phone"
        >

      </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="product-right">

      <span class="product-tag">
        Flagship Smartphone
      </span>

      <h1 id="productName">
        vivo Phone
      </h1>

      <p
        class="product-description"
        id="productDescription"
      >
        Premium smartphone experience.
      </p>

      <div
        class="product-price-page"
        id="productPrice"
      >
        ₹00,000
      </div>

      <!-- SPECS -->

      <div class="specs">

        <div class="spec-box">

          <h3 id="spec1">
            200MP
          </h3>

          <p>Camera</p>

        </div>

        <div class="spec-box">

          <h3 id="spec2">
            6000mAh
          </h3>

          <p>Battery</p>

        </div>

        <div class="spec-box">

          <h3 id="spec3">
            120Hz
          </h3>

          <p>Display</p>

        </div>

        <div class="spec-box">

          <h3 id="spec4">
            16GB
          </h3>

          <p>RAM</p>

        </div>

      </div>

      <!-- BUTTONS -->

      <div class="product-buttons">

        <button class="buy-btn">
          Buy Now
        </button>

        <button class="cart-btn">
          Add to Cart
        </button>

      </div>

    </div>

  </section>

  <!-- JS -->

  <script src="js/product.js"></script>

  
</body>

</html>
